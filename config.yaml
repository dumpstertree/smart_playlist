# ---------------------------------------------------------------------------
# smart_playlist config
# ---------------------------------------------------------------------------

library_path: /raid/active
db_path: /app/embeddings.db
model_path: /models/discogs-effnet-bs64-1.pb
output_m3u: /app/playlist.m3u

audio_formats:
  - mp3
  - flac

# ---------------------------------------------------------------------------
# Playlist shape
# ---------------------------------------------------------------------------

# No upper limit. Total length (no loop) = num_anchors + (num_anchors-1) * interpolation_count
num_anchors: 10
interpolation_count: 10

# diverse = recommended. Run --list-modes for all options.
interpolation_mode: diverse

allow_anchors_in_pool: true
fuzzy_match_threshold: 0.6

# ---------------------------------------------------------------------------
# Looping
# ---------------------------------------------------------------------------

# When true, a bridge segment is added after the final anchor that
# interpolates back to the first anchor for seamless looping.
loop: true

# ---------------------------------------------------------------------------
# Diverse mode tuning
# ---------------------------------------------------------------------------

diverse_curve_power: 0.9
diverse_candidates: 20
diverse_artist_window: 3
diverse_artist_penalty: 0.35

# ---------------------------------------------------------------------------
# AzuraCast integration
# ---------------------------------------------------------------------------
# The playlist will be CLEARED then re-imported on every run (full overwrite).
# Leave url blank to skip upload entirely.

azuracast:
  url: "http://192.168.1.143"
  api_key: "809ef913c5b4fbfa:d8aea327393dec3c7431d1565170400d"
  station_id: 1
  playlist_id: 2

# ---------------------------------------------------------------------------
# Anchor sources
# ---------------------------------------------------------------------------
# All four lists are combined into one candidate pool, then num_anchors
# tracks are randomly selected from that pool.
#
# anchor_songs  : "Artist - Title"   -- adds that one track
# anchor_artists: "Artist Name"      -- adds ALL tracks by that artist
# anchor_albums : "Artist - Album"   -- adds ALL tracks on that album
# anchor_genres : "Genre Name"       -- adds ALL tracks with that genre tag
#
# Matching is fuzzy (uses fuzzy_match_threshold above).
# List more sources than you need -- the random selection handles the rest.

anchor_songs:
  - "Metric - Help I'm Alive"
  - "Chappell Roan - Pink Pony Club"
  - "Metronomy - Salted Carmel Ice Cream"
  - "MGMT - She Works Out Too Much"
  - "Empire of the Sun - Walking on a Dream"
  - "Carly Rae Jepsen - Automatically In Love"
  - "Carly Rae Jespsen - Emotion"
  - "Grimes - Realiti"
  - "Arcade Fire - Electric Blue"
  - "M83 - Midnight City"

anchor_artists: []
anchor_albums: []
anchor_genres: []

# ---------------------------------------------------------------------------
# Exclusions
# ---------------------------------------------------------------------------
# Works identically to anchors -- each list adds all matching tracks to the
# exclusion set. Excluded tracks are removed from the interpolation pool
# (they can still appear as anchors if matched via the anchor lists above).
#
# Matching is fuzzy (uses fuzzy_match_threshold above).

exclude_songs: []
exclude_artists: []
exclude_albums: []
exclude_genres: []
